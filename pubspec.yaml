name: vault_x
description: Secure document vault with Google Drive sync
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  flutter_secure_storage: ^10.3.1
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  image_picker: ^1.0.4
  crypto: ^3.0.3
  intl: ^0.18.1
  permission_handler: ^11.0.1
  local_auth: ^2.1.8
  flutter_native_splash: ^2.3.10
  share_plus: ^7.2.1
  # Google auth + Drive
  google_sign_in: ^7.1.1
  googleapis: ^12.0.0
  http: ^1.2.0
  # PDF / document rendering
  syncfusion_flutter_pdfviewer: ^33.2.13
  pdf: ^3.10.8
  printing: ^5.12.0
  # Image processing (enhance feature)
  image: ^4.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#12121F"
  image: assets/icon/icon.png
  android: true
  ios: false
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
