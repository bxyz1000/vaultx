name: vault_x
description: Offline document vault app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  flutter_secure_storage: ^9.0.0
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  image_picker: ^1.0.4
  crypto: ^3.0.3
  intl: ^0.18.1
  permission_handler: ^11.0.1
  local_auth: ^2.1.8
  flutter_native_splash: ^2.3.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#12121F"
  image: assets/icon/icon.png
  android: true
  ios: false
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/icon/